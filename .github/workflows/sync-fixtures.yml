name: Sync World Cup Fixtures

on:
  schedule:
    # Baseline refresh outside match windows. Keeps fixture changes synced without burning provider quota.
    - cron: '17 */4 * * *'
    # Near-live tournament refresh windows. GitHub cron is not real-time and may be delayed.
    - cron: '17 * 11-30 6 *'
    - cron: '17 * 1-19 7 *'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync fixtures and results
        run: npm run sync:fixtures
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FOOTBALL_API_HOST: ${{ secrets.FOOTBALL_API_HOST || vars.FOOTBALL_API_HOST }}
          FIXTURE_PROVIDER: ${{ vars.FIXTURE_PROVIDER || 'api-football' }}
